<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Reminder - Welcome & Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #e3f2fd, #bbdefb);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card-wrapper {
            display: flex;
            flex-direction: row;
            border-radius: 15px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            max-width: 900px;
            background: #fff;
        }
        .welcome-section {
            background: linear-gradient(to right, #2196f3, #42a5f5);
            color: white;
            padding: 40px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }
        .welcome-section h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .welcome-section p {
            font-size: 1.1rem;
        }
        .login-card {
            flex: 1;
            padding: 30px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .login-header img {
            width: 70px;
            height: 70px;
            margin-bottom: 10px;
        }
        .form-control {
            border-radius: 10px;
        }
        .btn-login {
            background: linear-gradient(to right, #2196f3, #42a5f5);
            border: none;
            border-radius: 10px;
            padding: 10px;
            font-weight: bold;
            color: white;
            transition: 0.3s;
        }
        .btn-login:hover {
            background: linear-gradient(to right, #1976d2, #1e88e5);
        }
        .text-center small a {
            text-decoration: none;
            color: #2196f3;
        }
    </style>
</head>
<body>
    <div class="card-wrapper">
        
        <div class="welcome-section">
            <h1>Welcome to Medicine Reminder</h1>
            <p>Stay healthy and never miss your medication. Track your doses and manage your health easily with our smart reminders!</p>
        </div>        

        <div class="login-card">
            <div class="login-header">
                <img src="https://cdn-icons-png.flaticon.com/512/2966/2966486.png" alt="Medical Logo">
                <h3>Login</h3>
                <p>Enter your credentials to continue</p>
            </div>

            <form method="POST" action="{{ url_for('login') }}">
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control" name="email" placeholder="Enter your email" autocomplete="off" required>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" placeholder="Enter your password" autocomplete="new-password" required>
                </div>
                <button type="submit" class="btn btn-login w-100">Login</button>
            </form>

            {% if error %}
                <p class="text-danger text-center mt-2">{{ error }}</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
