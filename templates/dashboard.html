<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Medicine Reminder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #e3f2fd, #bbdefb);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      padding: 30px;
    }
    .dashboard-card {
      background: #fff;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0px 6px 25px rgba(0,0,0,0.15);
      width: 100%;
      max-width: 900px;
    }
    h2 {
      font-weight: 700;
      color: #0d6efd;
      margin-bottom: 25px;
      text-align: center;
      font-size: 1.8rem;
    }
    .option-box {
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      transition: all 0.3s ease;
      background: #f8f9fa;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    .option-box:hover {
      transform: translateY(-5px);
      background: #e3f2fd;
    }
    .option-box h4 {
      margin-top: 10px;
      font-weight: 600;
      font-size: 1rem;
    }
    .option-box span {
      font-size: 30px;
      display: block;
      margin-bottom: 8px;
    }
    a {
      text-decoration: none;
      color: inherit;
    }
  </style>
</head>
<body>
  <div class="dashboard-card">
    <h2>📌 Medicine Reminder</h2>
    <div class="row g-3">
      <div class="col-md-6">
        <a href="{{ url_for('add_reminder') }}">
          <div class="option-box">
            <span>💊</span>
            <h4>Add Dosage Reminder</h4>
          </div>
        </a>
      </div>
      <div class="col-md-6">
        <a href="{{ url_for('upload_medicine') }}">
          <div class="option-box">
            <span>📷</span>
            <h4>Upload for Expiry Detection</h4>
          </div>
        </a>
      </div>
      <div class="col-md-6">
        <a href="{{ url_for('expired') }}">
          <div class="option-box">
            <span>⚠️</span>
            <h4>View Expired Medicines</h4>
          </div>
        </a>
      </div>
      <div class="col-md-6">
        <a href="{{ url_for('view_reminders') }}">
          <div class="option-box">
            <span>🕒</span>
            <h4>View All Reminders</h4>
          </div>     
        </a>
      </div>
    </div>
  </div>
</body>
</html>
