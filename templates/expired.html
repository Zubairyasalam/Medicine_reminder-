<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expired Medicines</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #e3f2fd, #bbdefb);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 30px;
        }

        .expired-card {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0px 6px 25px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 800px;
        }
        h2 {
            font-weight: 700;
            color: #d32f2f;
            margin-bottom: 20px;
            text-align: center; 
        }
        .table thead th {
            font-weight: bold; 
        }
        .btn-outline-back { 
            color: #0d6efd; 
            border-color: #0d6efd;
        }
        .btn-outline-back:hover {
            color: #fff;
            background-color: #0d6efd;
        }
    </style>
</head>
<body>
    <div class="expired-card">
        <h2>⚠️ Expired Medicines</h2>
        <table class="table table-bordered table-hover">
            <thead class="table-danger">
                <tr>
                    <th>Medicine</th>
                    <th>Expiry Date</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Paracetamol</td>
                    <td>2025-11-10</td>
                </tr>
                <tr>
                    <td>Amoxicillin</td>
                    <td>2025-12-12</td>
                </tr>
                  <tr>
                    <td>vitamin-c </td>
                    <td>2025-9-30</td>
            </tbody>
        </table>
        <div class="text-center">
            <a href="#" class="btn btn-outline-back mt-3">⬅ Back</a>
        </div>
    </div>
</body>
</html>
