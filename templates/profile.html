<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Patient Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      background: linear-gradient(135deg, #e3f2fd 0, #bbdefb 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .main-card {
      display: flex;
      flex-wrap: wrap;
      max-width: 950px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.14);
      background: #fff;
    }
    .card-left {
      flex: 1 1 370px;
      background: linear-gradient(135deg, #1e90ff 65%, #3cb0fd 100%);
      color: #fff;
      padding: 48px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .left-title {
      font-size: 2.6rem;
      font-weight: 700;
      margin-bottom: 20px;
      text-align: center;
    }
    .card-right {
      flex: 1 1 500px;
      background: #fff;
      padding: 56px 42px 32px;
      border-radius: 0 20px 20px 0;
    }
    .profile-image {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid #1e90ff;
      object-fit: cover;
      margin: 0 auto 22px;
      display: block;
    }
    .form-control, .form-select {
      border-radius: 10px;
      background-color: #f6faff;
      border: 1px solid #d6eeff;
    }
    .btn-primary {
      background: linear-gradient(90deg,#3498fd,#1e90ff 90%);
      border-radius: 10px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="main-card">
    <div class="card-left">
      <div class="left-title">Welcome to <br> Hospital Profile</div>
      <div class="left-desc">
        Manage patient data securely and ensure high-quality care. All information remains private and accessible only to authorized medical staff.
      </div>
    </div>

    <div class="card-right">
      <form method="POST" action="/profile" enctype="multipart/form-data">
        <img id="previewImage" src="https://cdn-icons-png.flaticon.com/512/847/847969.png" class="profile-image" alt="Profile" />
        
        <div class="mb-3 text-center">
          <label for="fileUpload" class="form-label">Upload Profile Picture</label>
          <input type="file" id="fileUpload" class="form-control mx-auto" style="max-width:260px;" accept="image/*"/>
        </div>

        <div class="mb-2">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" class="form-control" placeholder="Enter full name" required>
        </div>


        <div class="row">
          <div class="col-md-6 mb-2">
            <label class="form-label">Age</label>
            <input type="number" name="age" class="form-control" placeholder="Age" required>
          </div>

          <div class="col-md-6 mb-2">
            <label class="form-label">Gender</label>
            <select name="gender" class="form-select" required>
              <option value="">Select</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-2">
            <label class="form-label">Blood Group</label>
            <select name="blood_group" class="form-select" required>
              <option value="">Select</option>
              <option>A+</option><option>A−</option>
              <option>B+</option><option>B−</option>
              <option>AB+</option><option>AB−</option>
              <option>O+</option><option>O−</option>
            </select>
          </div>
          <div class="col-md-6 mb-2">
            <label class="form-label">Medical Condition (optional)</label>
            <input type="text" name="condition" class="form-control" placeholder="e.g., Hypertension, Diabetes">
          </div>
        </div>

         <div class="row">
          <div class="col-md-6 mb-2">
            <label class="form-label">Contact Number</label>
            <input type="text" name="contact" class="form-control" placeholder="Enter contact number" required>
          </div>
          <div class="col-md-6 mb-2">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="Enter email" required>
          </div>
        </div>
          <div class="mb-2">
          <label class="form-label">Address</label>
          <textarea name="address" rows="2" class="form-control" placeholder="Enter address"></textarea>
        </div>
          <div class="text-end">
          <button type="submit" class="btn btn-primary">Save & Continue</button>
        </div>
      </form>
    </div>
  </div>
  <script>
    const fileUpload = document.getElementById("fileUpload");
    const previewImage = document.getElementById("previewImage");
    fileUpload.addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (file && file.type.startsWith("image/")) {
        const reader = new FileReader();
        reader.onload = (e) => { previewImage.src = e.target.result; };
        reader.readAsDataURL(file);
      }
    });
  </script>
</body>
</html>
