<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All Reminders</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #e3f2fd, #bbdefb);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      padding: 30px;
    }
    .reminder-card {
      background: #fff;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0px 6px 25px rgba(0,0,0,0.15);
      width: 100%;
      max-width: 900px;
    }
    h2 {
      font-weight: 700;
      color: #0d6efd;
      margin-bottom: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="reminder-card">
    <h2>🕒 All Dosage Reminders</h2>

    {% if reminders %}
      <table class="table table-striped table-hover">
        <thead class="table-primary">
          <tr>
            <th>Medicine</th>
            <th>Dosage</th>
            <th>Time</th>
            <th>Duration</th>
          </tr>
        </thead>
        <tbody>
          {% for r in reminders %}
          <tr>
            <td>{{ r.medicine }}</td>
            <td>{{ r.dosage }}</td>
            <td>{{ r.time }}</td>
            <td>{{ r.duration }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    {% else %}
      <p class="text-center text-muted">No reminders added yet.</p>
    {% endif %}

    <div class="text-center">
      <a href="{{ url_for('dashboard') }}" class="btn btn-outline-primary mt-3">⬅ Back</a>
    </div>
  </div>
</body>
</html>
